const logEl = document.getElementById('log');
function log(msg, cls='info'){ logEl.innerHTML += `<span class="${cls}">${msg}</span>\n`; logEl.scrollTop = logEl.scrollHeight; }

async function seed(){
  const btn = document.getElementById('run'); btn.disabled = true;
  log('Démarrage...', 'info');
  let ok=0, fail=0;
  for(const p of PERSONAS){
    try{
      const { data, error } = await sb.auth.signUp({ email:p.email, password:PW });
      if(error){
        if((error.message||'').toLowerCase().includes('already')){ log(`• ${p.name} (${p.email}) — existe déjà, ignoré`, 'info'); }
        else { log(`✗ ${p.name} — ${error.message}`, 'err'); fail++; }
        continue;
      }
      const uid = data.user?.id || data.session?.user?.id;
      if(!uid){ log(`✗ ${p.name} — pas de session (Confirm email encore actif ?)`, 'err'); fail++; continue; }
      await new Promise(r=>setTimeout(r,400)); // laisse le trigger créer le profil
      await sb.from('profiles').upsert({ id:uid, name:p.name, handle:p.handle, color:p.color, types:p.types });
      for(const it of p.items){
        await sb.from('items').insert({ user_id:uid, type:it.type, emoji:it.emoji, title:it.title, meta:it.meta, stars:it.stars||0, status:it.status||'todo', wish:false });
      }
      await sb.auth.signOut();
      log(`✓ ${p.name} (@${p.handle}) — ${p.items.length} œuvres`, 'ok');
      ok++;
    }catch(e){ log(`✗ ${p.name} — ${e.message}`, 'err'); fail++; }
  }
  log(`\nTerminé : ${ok} créés, ${fail} échecs.`, ok>0?'ok':'err');
  log('Tu peux supprimer cette page (seed.html) après usage.', 'info');
  btn.disabled = false;
}
