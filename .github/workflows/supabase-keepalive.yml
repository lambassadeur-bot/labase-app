name: Supabase keep-alive

# Maintient le projet Supabase de DIG actif (anti-pause au bout de ~7 jours d'inactivité)
# et logue un petit rapport (nb de profils / items). Tourne sur les serveurs GitHub,
# indépendamment du PC de l'utilisateur.

on:
  schedule:
    - cron: '0 9 * * 1,4'   # Lundi et jeudi, 09:00 UTC
  workflow_dispatch:        # permet de le lancer aussi à la main

jobs:
  ping:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://zczqvtjlkozcfjpojnnx.supabase.co
      ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpjenF2dGpsa296Y2ZqcG9qbm54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjc4MTQsImV4cCI6MjA5NTgwMzgxNH0.wkJORaQ6DbVvmua7tGtOv7-DFOJ_VgXs1ra2gGCyDn4
    steps:
      - name: Ping + rapport
        run: |
          echo "=== DIG — keep-alive Supabase $(date -u) ==="
          PROFILES=$(curl -s "$SUPABASE_URL/rest/v1/profiles?select=id" -H "apikey: $ANON_KEY" -H "Authorization: Bearer $ANON_KEY")
          ITEMS=$(curl -s "$SUPABASE_URL/rest/v1/items?select=id" -H "apikey: $ANON_KEY" -H "Authorization: Bearer $ANON_KEY")
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$SUPABASE_URL/rest/v1/profiles?select=id&limit=1" -H "apikey: $ANON_KEY" -H "Authorization: Bearer $ANON_KEY")
          NPROF=$(echo "$PROFILES" | jq 'if type=="array" then length else 0 end')
          NITEMS=$(echo "$ITEMS" | jq 'if type=="array" then length else 0 end')
          echo "Statut HTTP : $CODE"
          echo "Profils     : $NPROF"
          echo "Items       : $NITEMS"
          if [ "$CODE" != "200" ]; then
            echo "::warning::Supabase n'a pas répondu 200 (code $CODE) — projet peut-être en pause."
            exit 1
          fi
          echo "Base active OK."
